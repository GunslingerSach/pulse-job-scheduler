services:
  # Single 100% FREE Web Service (Runs both API Server + Background Worker)
  - type: web
    name: pulse-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PROJECT_API_KEY
        sync: false
